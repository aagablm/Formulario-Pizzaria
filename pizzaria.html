<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pizzaria</title>
</head>
<body>
   <h1>Pizzaria</h1>
    </form>

    <fieldset>
      <legend><strong>Informações Pessoais</strong></legend>
   
    <div class=campo><label for="nome">Nome Completo:</label> 
      <input type="text" name="nome" id="nome" required placeholder="Seu nome">
    </div> <br>

      <div class=campo><label for="email">E-mail:</label>
        <input type="email" name="email" id="email" required autocomplete="email" placeholder="email@seudominio.com"> 
      </div> <br>

      <div class=campo><label for="telefone">Telefone:</label> 
        <input type="tel" name="telefone" id="telefone" required placeholder="Número de telefone">
      </div> <br>

      <div class=campo><label for="cidade">Cidade:</label> 
        <input type="text" name="cidade" id="cidade" required> 
      </div> <br>

      <div class=campo><label for="bairro">Bairro:</label> 
        <input type="text" name="bairro" id="bairro" required>
      </div> <br>

      <div class=campo><label for="rua">Rua:</label> 
        <input type="text" name="rua" id="rua" required>
	</div><br>
	
	<div class=campo>
          <label for="numero">Número:</label>
        <input type="number" name="numero" id="numero" requerid>
      </div> <br>
</fieldset><br>
  
  <fieldset>

    <legend><strong>Pedido</legend></strong>

    <div class="campo"><label for="tamanhoselect">Tamanho:</label>
            <select name="tamanho" id="tamanhoselect">
            <option select disable value="Selecione o tamanho">Selecione o tamanho</option>
            <option value="Pequena">Pequena</option>
            <option value="Média">Média</option></option>
            <option value="Grande">Grande</option>
            <option value="Gigante">Gigante</option></select>
            </div> <br>

  <div class="campo"><label for="sabor">Selecione o Sabor:</label><br>
    <input type="checkbox"value="QuatroQueijos">Quatro Queijos<br>
      <input type="checkbox" value="Pepperoni">Peperroni<br>
      <input type="checkbox" value="StrogonoffdeCarne">Strogonoff de Carne<br>
      <input type="checkbox" value="Mexicana">Mexicana<br>
      <input type="checkbox" value="Calabresa">Calabresa<br>
      <input type="checkbox"  value="Chocolate Branco">Chocolate Branco<br>
      <input type="checkbox"  value="Chocolate Preto">Chocolate Preto<br>
   </div> <br>

 <div class="campo"><label for="bordaselect">Borda:</label>
        <select  name="borda" id="bordaselect">
          <option select disable value="Selecione o tamanho">Selecione a borda</option>
          <option value="semborda">Sem borda</option>
          <option value="requeijao">Requeijão</option></option>
          <option value="chocolate">Chocolate</option></select>
 </div> <br>

  <div class="campo"><label for="observacoes">Observações do Pedido:</label> <br>
    <textarea name="observacoes" id="observacoes" maxlength="100" rows="5" cols="35" style="resize:none"></textarea>
  </div> <br>
</fieldset>
<fieldset>
  <legend><strong>Pagamento</strong></legend>

  <div class="campo">
    <label>Forma de pagamento:</label>
    <label>
    <input type="radio" name="pagamento" value="Dinheiro" checked>Dinheiro
    </label>
    <label>
    <input type="radio" name="pagamento" value="Cartao">Cartão
    </label>
    <label>
    <input type="radio" name="pagamento" value="Cheque">Cheque
    </label>
  </div>
</fieldset>

</form>  
</body>
</html>
